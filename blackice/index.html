<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Black Ice Multiplayer</title>

<style>

html,body{
margin:0;
overflow:hidden;
background:#e9f5ff;
}

canvas{
display:block;
width:100vw;
height:100vh;
background:radial-gradient(
1200px 800px at center,
#f7fbff 0%,
#e9f5ff 55%,
#dff0ff 100%
);
}

#menu{
position:fixed;
top:20px;
left:20px;
z-index:100;
}

button{
padding:10px 18px;
margin-right:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

#status{
position:fixed;
top:20px;
right:20px;
background:white;
padding:10px;
border-radius:10px;
font-family:sans-serif;
}

</style>
</head>
<body>

<div id="menu">
<button onclick="joinRoom('room1')">Room 1</button>
<button onclick="joinRoom('room2')">Room 2</button>
<button onclick="joinRoom('room3')">Room 3</button>
</div>

<div id="status">Disconnected</div>

<canvas id="game"></canvas>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

const SERVER_URL = "https://blackice-server.onrender.com";

const socket = io(SERVER_URL);

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const statusEl = document.getElementById("status");

let W = window.innerWidth;
let H = window.innerHeight;

canvas.width = W;
canvas.height = H;

window.addEventListener("resize", () => {

W = window.innerWidth;
H = window.innerHeight;

canvas.width = W;
canvas.height = H;

});

let roomConfig = null;
  
const WORLD_WIDTH = 1920;
const WORLD_HEIGHT = 1080;

const WALL_THICK = 28;

const SPIKE_DEPTH = 42;
const SPIKE_GAP = 16;

const CENTER_SPINNER_ARMS = roomConfig.CENTER_SPINNER_ARMS;
const CENTER_SPINNER_INNER = roomConfig.CENTER_SPINNER_INNER;
const CENTER_SPINNER_OUTER = roomConfig.CENTER_SPINNER_OUTER;
const CENTER_BLADE_HALF = 12;
const SPINNER_SPIKE_LENGTH = roomConfig.SPINNER_SPIKE_LENGTH;
const SPINNER_SPIKE_WIDTH = roomConfig.SPINNER_SPIKE_WIDTH;

const ATTACK_RANGE = roomConfig.ATTACK_RANGE;
const ATTACK_ARC = Math.PI / 2.2;

let myId = null;

let currentRoom = null;

let spinnerAngle = 0;

let players = {};

const keys = {};

const spikes = [];

regenSpikes();

window.addEventListener("keydown", e => {

keys[e.code] = true;

if([
"ArrowUp",
"ArrowDown",
"ArrowLeft",
"ArrowRight",
"Space"
].includes(e.code)){
e.preventDefault();
}

});

window.addEventListener("keyup", e => {
keys[e.code] = false;
});

function joinRoom(room){

currentRoom = room;

socket.emit("joinRoom", room);

}

socket.on("connect", () => {

myId = socket.id;

statusEl.innerText = "Connected";

});

socket.on("disconnect", () => {

statusEl.innerText = "Disconnected";

});

socket.on("roomFull", () => {
alert("Room full");
});

socket.on("state", state => {

players = state.players;

spinnerAngle = state.spinnerAngle;

  if (state.config) {
    roomConfig = state.config;
  }

});

function updateInput(){

if(!currentRoom) return;

socket.emit("input",{

up: keys["KeyW"] || keys["ArrowUp"],
down: keys["KeyS"] || keys["ArrowDown"],
left: keys["KeyA"] || keys["ArrowLeft"],
right: keys["KeyD"] || keys["ArrowRight"],

attack: keys["Space"]

});

}

setInterval(updateInput,1000/60);

function worldToScreen(x,y){

const sx = (x / WORLD_WIDTH) * W;
const sy = (y / WORLD_HEIGHT) * H;

return {x:sx,y:sy};

}

function regenSpikes(){

spikes.length = 0;

let x = WALL_THICK;

while(x + SPIKE_GAP <= WORLD_WIDTH - WALL_THICK){

spikes.push(tri(
x,
WALL_THICK,
x + SPIKE_GAP/2,
WALL_THICK + SPIKE_DEPTH,
x + SPIKE_GAP,
WALL_THICK
));

spikes.push(tri(
x,
WORLD_HEIGHT - WALL_THICK,
x + SPIKE_GAP/2,
WORLD_HEIGHT - WALL_THICK - SPIKE_DEPTH,
x + SPIKE_GAP,
WORLD_HEIGHT - WALL_THICK
));

x += SPIKE_GAP;
}

let y = WALL_THICK;

while(y + SPIKE_GAP <= WORLD_HEIGHT - WALL_THICK){

spikes.push(tri(
WALL_THICK,
y,
WALL_THICK + SPIKE_DEPTH,
y + SPIKE_GAP/2,
WALL_THICK,
y + SPIKE_GAP
));

spikes.push(tri(
WORLD_WIDTH - WALL_THICK,
y,
WORLD_WIDTH - WALL_THICK - SPIKE_DEPTH,
y + SPIKE_GAP/2,
WORLD_WIDTH - WALL_THICK,
y + SPIKE_GAP
));

y += SPIKE_GAP;
}
}

function tri(x1,y1,x2,y2,x3,y3){

return{
a:{x:x1,y:y1},
b:{x:x2,y:y2},
c:{x:x3,y:y3}
};

}

function drawWalls(){

ctx.fillStyle = "#0b0b0b";

ctx.fillRect(0,0,WORLD_WIDTH,WALL_THICK);
ctx.fillRect(0,WORLD_HEIGHT-WALL_THICK,WORLD_WIDTH,WALL_THICK);

ctx.fillRect(0,0,WALL_THICK,WORLD_HEIGHT);
ctx.fillRect(WORLD_WIDTH-WALL_THICK,0,WALL_THICK,WORLD_HEIGHT);

}

function drawSpikes(){

ctx.fillStyle = "#0b0b0b";

for(const t of spikes){

ctx.beginPath();

ctx.moveTo(t.a.x,t.a.y);
ctx.lineTo(t.b.x,t.b.y);
ctx.lineTo(t.c.x,t.c.y);

ctx.closePath();

ctx.fill();
}
}

function drawSpinner(){

ctx.save();

ctx.translate(
WORLD_WIDTH / 2,
WORLD_HEIGHT / 2
);

ctx.rotate(spinnerAngle);

ctx.fillStyle = "#0b0b0b";

for(let i=0;i<CENTER_SPINNER_ARMS;i++){

ctx.rotate((Math.PI*2)/CENTER_SPINNER_ARMS);

ctx.beginPath();

ctx.moveTo(CENTER_SPINNER_INNER,-CENTER_BLADE_HALF);
ctx.lineTo(CENTER_SPINNER_OUTER,-CENTER_BLADE_HALF);
ctx.lineTo(CENTER_SPINNER_OUTER,CENTER_BLADE_HALF);
ctx.lineTo(CENTER_SPINNER_INNER,CENTER_BLADE_HALF);

ctx.closePath();

ctx.fill();

const baseStart = CENTER_SPINNER_OUTER - SPINNER_SPIKE_WIDTH;
const baseEnd = CENTER_SPINNER_OUTER;

ctx.beginPath();

ctx.moveTo(baseStart,CENTER_BLADE_HALF);
ctx.lineTo(baseEnd,CENTER_BLADE_HALF);

ctx.lineTo(
(baseStart+baseEnd)/2,
CENTER_BLADE_HALF + SPINNER_SPIKE_LENGTH
);

ctx.closePath();

ctx.fill();
}

ctx.beginPath();
ctx.arc(0,0,10,0,Math.PI*2);
ctx.fill();

ctx.restore();
}

function drawPlayers(){

for(const id in players){

const p = players[id];
if (!p) continue;

if(!p.alive) continue;

ctx.save();

ctx.globalAlpha = 0.12;

ctx.fillStyle = "#000";

ctx.fillRect(
p.x - p.size/2 + 3,
p.y - p.size/2 + 5,
p.size,
p.size
);

ctx.globalAlpha = 1;

ctx.fillStyle = p.color;

ctx.fillRect(
p.x - p.size/2,
p.y - p.size/2,
p.size,
p.size
);

const nx = Math.cos(p.facing);
const ny = Math.sin(p.facing);

ctx.fillStyle = "white";

ctx.fillRect(
p.x + nx*(p.size/2) - 2,
p.y + ny*(p.size/2) - 2,
4,
4
);

if(p.attackActiveTimer > 0){

ctx.save();

ctx.translate(p.x,p.y);

ctx.rotate(p.facing);

ctx.globalAlpha = 0.2;

ctx.beginPath();

ctx.moveTo(0,0);

ctx.arc(
0,
0,
ATTACK_RANGE,
-ATTACK_ARC/2,
ATTACK_ARC/2
);

ctx.closePath();

ctx.fill();

ctx.restore();
}

if(id === myId){

ctx.strokeStyle = "white";

ctx.lineWidth = 3;

ctx.strokeRect(
p.x - p.size/2 - 3,
p.y - p.size/2 - 3,
p.size + 6,
p.size + 6
);
}

ctx.restore();
}
}

function drawIceSheen(){

const t = performance.now() * 0.001;

for(let i=0;i<3;i++){

const y = (H/3)*i + ((t*40+i*80)%(H/3));

const grad = ctx.createLinearGradient(
0,y,W,y+80
);

grad.addColorStop(0,"rgba(255,255,255,0)");
grad.addColorStop(0.5,"rgba(255,255,255,0.08)");
grad.addColorStop(1,"rgba(255,255,255,0)");

ctx.fillStyle = grad;

ctx.fillRect(0,y,W,80);
}
}

function render() {

ctx.clearRect(0,0,W,H);

const scale = Math.min(
W / WORLD_WIDTH,
H / WORLD_HEIGHT
);

const offsetX =
(W - WORLD_WIDTH * scale) / 2;

const offsetY =
(H - WORLD_HEIGHT * scale) / 2;

ctx.save();

ctx.translate(offsetX,offsetY);

ctx.scale(scale,scale);

drawIceSheen();

drawWalls();

drawSpikes();

drawSpinner();

drawPlayers();

ctx.restore();

requestAnimationFrame(render);

}

render();

</script>
</body>
</html>
